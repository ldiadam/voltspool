name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: voltspool-macos-arm64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: voltspool-macos-amd64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: voltspool-windows-amd64
            ext: ".exe"
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: voltspool-linux-amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: voltspool-linux-arm64
            ext: ""

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.artifact }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.artifact }}${{ matrix.ext }} ./cmd/print-agent-gui/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          draft: false
          prerelease: false
